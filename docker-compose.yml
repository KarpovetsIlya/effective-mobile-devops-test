services:
  backend:
    container_name: effective-mobile-backend
    build:
      context: ./backend
    expose:
      - "8080"
    networks:
      - effective-mobile-network

  nginx:
    container_name: effective-mobile-nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - effective-mobile-network

networks:
  effective-mobile-network:
    driver: bridge
